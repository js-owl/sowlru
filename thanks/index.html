<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, follow" />
  <meta
    name="description"
    content="Спасибо за заявку в частный детский сад «Совёнок» в Мытищах. Мы свяжемся с вами в ближайшее рабочее время."
  />
  <title>Спасибо за заявку — детский сад «Совёнок»</title>
  <link rel="canonical" href="https://sowl.ru/thanks/" />
  <link rel="icon" type="image/png" sizes="120x120" href="../favicon128.png" />
  <style>
    :root {
      --bg-cream: #fdfbf7;
      --text-brown: #4a3f35;
      --main-brown: #ab5a03;
      --link-brown: #723800;
      --muted: #6b5f54;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Comfortaa", "Segoe UI", sans-serif;
      background-color: var(--bg-cream);
      color: var(--text-brown);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    a {
      color: var(--link-brown);
    }

    .site-header {
      padding: 1.25rem 1.5rem;
      text-align: center;
    }

    .logo img {
      display: inline-block;
      width: 100px;
      height: auto;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem 3rem;
    }

    .thanks-card {
      max-width: 560px;
      width: 100%;
      text-align: center;
      background: #fff;
      border-radius: 20px;
      padding: 2.5rem 2rem;
      box-shadow: 0 10px 30px rgba(74, 63, 53, 0.08);
    }

    h1 {
      font-size: 1.75rem;
      margin-bottom: 1rem;
      color: var(--text-brown);
    }

    h1::after {
      content: "";
      display: block;
      width: 80px;
      height: 4px;
      background-color: var(--main-brown);
      margin: 12px auto 0;
      border-radius: 2px;
    }

    p {
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .btn {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.85rem 1.5rem;
      border-radius: 999px;
      background: var(--main-brown);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
    }

    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.9rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <header class="site-header">
    <a href="https://sowl.ru/" class="logo" aria-label="На главную — детский сад Совёнок">
      <img
        src="../_img/logo-128-cream.webp"
        width="128"
        height="71"
        alt="Детский сад Совёнок — логотип"
      />
    </a>
  </header>

  <main>
    <div class="thanks-card
      <h1>Спасибо за заявку!</h1>
      <p>
        Мы получили ваши контакты и перезвоним в рабочее время
        (пн–пт, 8:00–20:00).
      </p>
      <p>
        Если вопрос срочный, позвоните нам:
        <a href="tel:+79057750627">+7 (905) 775-06-27</a>.
      </p>
      <a href="https://sowl.ru/" class="btn">Вернуться на главную</a>
    </div>
  </main>

  <footer>
    <p>&copy; частный Монтессори детский сад «Совенок». 2016–2026</p>
  </footer>

  <script src="../_js/analytics-config.js"></script>
  <script src="../_js/analytics-deferred.js"></script>
  <noscript>
    <div>
      <img src="https://mc.yandex.ru/watch/38548030" style="position: absolute; left: -9999px" alt="" />
    </div>
  </noscript>
</body>
</html>
